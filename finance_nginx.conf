# Reference nginx config for the Finance Anomaly Detector.
#
# The limit_req_zone directive must live in the http {} block
# (e.g. /etc/nginx/conf.d/ratelimit.conf):
#
#   limit_req_zone $binary_remote_addr zone=fad_auth:10m rate=10r/m;
#
# TLS is expected to be layered on by certbot (listen 443 + redirect).

server {
    listen 80;
    server_name f.micutu.com;

    # Behind Cloudflare: restore the real client IP from CF-Connecting-IP, but
    # ONLY for connections originating in Cloudflare's ranges. Without this, a
    # request sent straight to the origin (bypassing Cloudflare) could forge
    # CF-Connecting-IP and evade/poison rate limiting. Keep the ranges fresh
    # from https://www.cloudflare.com/ips/. Strongly consider also firewalling
    # ports 80/443 to Cloudflare's ranges so the origin isn't directly reachable.
    include snippets/cloudflare-realip.conf;

    # Compress API JSON and static assets.
    gzip on;
    gzip_types application/json application/javascript text/css text/csv;
    gzip_min_length 1024;

    # Defense in depth on top of the app's own limiter.
    location ~ ^/api/(login|register)$ {
        limit_req zone=fad_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers (CSP comes from the app itself).
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # CSV uploads are capped at 5 MB by the app; give nginx headroom.
    client_max_body_size 6m;
}
